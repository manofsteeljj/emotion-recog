<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emotion Recognition AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0f1419;
        --bg-secondary: #1a202c;
        --bg-tertiary: #2d3748;
        --accent-primary: #00d9ff;
        --accent-secondary: #ff006e;
        --accent-success: #00ff88;
        --text-primary: #ffffff;
        --text-secondary: #a0aec0;
        --border-color: #2d3748;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
        --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        font-family: "Inter", -apple-system, system-ui, sans-serif;
        background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Header */
      .header {
        background: rgba(15, 20, 25, 0.8);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-color);
        padding: 24px 0;
        position: sticky;
        top: 0;
        z-index: 100;
        animation: slideDown 0.6s ease-out;
      }

      .header-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 24px;
      }

      .header h1 {
        font-family: "Sora", sans-serif;
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
      }

      .header p {
        font-size: 14px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: rgba(0, 217, 255, 0.1);
        border: 1px solid rgba(0, 217, 255, 0.3);
        border-radius: 20px;
        font-size: 12px;
        color: var(--accent-primary);
      }

      /* Main Container */
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 24px;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 32px;
        align-items: start;
      }

      /* Camera Section */
      .camera-section {
        animation: fadeInUp 0.8s ease-out 0.1s both;
      }

      .camera-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow-lg);
        transition: var(--transition);
      }

      .camera-card:hover {
        border-color: var(--accent-primary);
        box-shadow: 0 20px 40px rgba(0, 217, 255, 0.15);
      }

      #preview {
        position: relative;
        display: block;
        width: 100%;
        overflow: hidden;
        background: #000;
      }

      video {
        width: 100%;
        height: auto;
        display: block;
        background: #000;
      }

      canvas#overlay {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      canvas#canvas {
        display: none;
      }

      /* Camera Controls */
      .camera-controls {
        padding: 24px;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border-color);
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      /* Control Panel */
      .control-panel {
        animation: fadeInUp 0.8s ease-out 0.2s both;
      }

      .panel-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 28px;
        box-shadow: var(--shadow-md);
        transition: var(--transition);
      }

      .panel-card:hover {
        border-color: var(--accent-primary);
        box-shadow: 0 12px 32px rgba(0, 217, 255, 0.1);
      }

      .panel-section {
        margin-bottom: 28px;
      }

      .panel-section:last-child {
        margin-bottom: 0;
      }

      .panel-label {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--accent-primary);
        margin-bottom: 12px;
        display: block;
      }

      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--text-primary);
      }

      input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 14px;
        font-family: "Inter", sans-serif;
        transition: var(--transition);
      }

      input:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1);
      }

      input::placeholder {
        color: var(--text-secondary);
      }

      .divider {
        height: 1px;
        background: var(--border-color);
        margin: 24px 0;
      }

      /* Buttons */
      button {
        padding: 12px 20px;
        background: linear-gradient(135deg, var(--accent-primary) 0%, #00b8cc 100%);
        color: var(--bg-primary);
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        font-family: "Inter", sans-serif;
        box-shadow: var(--shadow-sm);
        position: relative;
        overflow: hidden;
      }

      button::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.2);
        transition: left 0.4s ease-out;
      }

      button:hover::before {
        left: 100%;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 217, 255, 0.3);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      button.secondary {
        background: var(--bg-tertiary);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
      }

      button.secondary:hover {
        border-color: var(--accent-primary);
        background: rgba(0, 217, 255, 0.05);
      }

      button.success {
        background: linear-gradient(135deg, var(--accent-success) 0%, #00dd77 100%);
      }

      button.success:hover {
        box-shadow: 0 8px 20px rgba(0, 255, 136, 0.3);
      }

      /* Status Display */
      .status-display {
        background: rgba(0, 217, 255, 0.05);
        border: 1px solid rgba(0, 217, 255, 0.2);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 20px;
        border-left: 3px solid var(--accent-primary);
        animation: slideInLeft 0.4s ease-out;
      }

      .status-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--accent-primary);
        margin-bottom: 4px;
        font-weight: 600;
      }

      #status {
        font-size: 14px;
        color: var(--text-primary);
        word-break: break-word;
      }

      /* Results Display */
      .results-section h3 {
        font-family: "Sora", sans-serif;
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
        color: var(--text-primary);
      }

      #result {
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 16px;
        font-size: 12px;
        line-height: 1.6;
        max-height: 400px;
        overflow-y: auto;
        font-family: "Monaco", "Courier New", monospace;
        color: var(--accent-primary);
        word-break: break-word;
        white-space: pre-wrap;
      }

      #result::-webkit-scrollbar {
        width: 6px;
      }

      #result::-webkit-scrollbar-track {
        background: transparent;
      }

      #result::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 3px;
      }

      #result::-webkit-scrollbar-thumb:hover {
        background: var(--accent-primary);
      }

      /* Animations */
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .header h1 {
          font-size: 24px;
        }

        .container {
          padding: 24px 16px;
        }
      }

      @media (max-width: 640px) {
        .header h1 {
          font-size: 20px;
        }

        .panel-card {
          padding: 20px;
        }

        .camera-controls {
          flex-direction: column;
        }

        button {
          width: 100%;
        }

        .button-group {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="header-content">
        <div class="header-inner">
          <div class="brand">
            <h1>Emotion Recognition</h1>
            <div class="tagline">Realtime face &amp; emotion demo</div>
          </div>

          <nav class="header-nav">
            <a href="#" class="nav-link">Home</a>
            <a href="#" class="nav-link">Docs</a>
            <a href="#" class="nav-link">Repo</a>
            <span class="status-badge" id="backendStatus">
              <span style="display: inline-block; width: 8px; height: 8px; background: #00ff88; border-radius: 50%;"></span>
              Connecting...
            </span>
          </nav>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="container">
      <div class="layout">
        <!-- Camera Preview -->
        <div class="camera-section">
          <div class="camera-card">
            <div id="preview" style="position: relative; display: block;">
              <video id="video" autoplay playsinline muted></video>
              <canvas id="overlay" style="position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none;"></canvas>
            </div>
            <div class="camera-controls">
              <button id="btnStart" class="success">▶ Start Camera</button>
              <button id="btnStop" class="secondary" disabled>⏹ Stop</button>
              <button id="btnAnalyze" class="secondary">🔍 Analyze</button>
            </div>
          </div>
          <canvas id="canvas" width="640" height="480" style="display:none"></canvas>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
          <div class="panel-card">
            <!-- User Section -->
            <div class="panel-section">
              <span class="panel-label">Identity</span>
              <label for="username">Username</label>
              <input 
                id="username" 
                type="text"
                placeholder="Enter your name" 
              />
            </div>

            <div class="divider"></div>

            <!-- Action Buttons -->
            <div class="panel-section">
              <span class="panel-label">Actions</span>
              <div class="button-group">
                <button id="btnRegister" class="success">📸 Register Face</button>
                <button id="btnAuth" class="secondary">🔐 Authenticate</button>
              </div>
            </div>

            <div class="divider"></div>

            <!-- Status Display -->
            <div class="panel-section">
              <span class="panel-label">Status</span>
              <div class="status-display">
                <div class="status-label">Activity</div>
                <div id="status">Ready</div>
              </div>
            </div>

            <!-- Results -->
            <div class="panel-section results-section">
              <h3>Detection Results</h3>
              <pre id="result">(waiting for analysis)</pre>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>

    <footer class="footer">
      <div class="container">
        <small>© 2026 Emotion Recognition · Built with OpenCV &amp; FastAPI</small>
      </div>
    </footer>
  </body>
</html>
